{{- if .Values.env.DEPLOY_DAEMONSET }}
{{- $caSecretName := "" }}
{{- if .Values.tls.enabled }}
{{- if .Values.tls.autoDiscover }}
{{- $caSecretName = printf "%s-cluster-ca-cert" .Values.tls.kafkaClusterName }}
{{- else }}
{{- $caSecretName = .Values.tls.caSecretName }}
{{- end }}
{{- end }}
{{- $saslSecretName := "" }}
{{- if .Values.sasl.enabled }}
{{- if .Values.sasl.existingSecret }}
{{- $saslSecretName = .Values.sasl.existingSecret }}
{{- else if .Values.sasl.autoDiscover }}
{{- $saslSecretName = printf "%s-sasl-credentials" .Values.sasl.kafkaClusterName }}
{{- end }}
{{- end }}
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: {{ include "akto-k8s-agent.fullname" . }}
  labels:
    app: akto-collector
    {{- include "akto-k8s-agent.labels" . | nindent 4 }}
spec:
  selector:
    matchLabels:
      app: akto-collector
      app.kubernetes.io/name: {{ include "akto-k8s-agent.name" . }}
  template:
    metadata:
      labels:
        app: akto-collector
        app.kubernetes.io/name: {{ include "akto-k8s-agent.name" . }}
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      hostNetwork: {{ .Values.hostNetwork }}
      dnsPolicy: {{ .Values.dnsPolicy }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: mirror-api-logging
          image: {{ .Values.image.repository }}:{{ .Values.image.tag }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
            - name: AKTO_TRAFFIC_BATCH_TIME_SECS
              value: {{ .Values.env.AKTO_TRAFFIC_BATCH_TIME_SECS | quote }}
            - name: AKTO_TRAFFIC_BATCH_SIZE
              value: {{ .Values.env.AKTO_TRAFFIC_BATCH_SIZE | quote }}
            - name: AKTO_INFRA_MIRRORING_MODE
              value: {{ .Values.env.AKTO_INFRA_MIRRORING_MODE | quote }}
            - name: AKTO_KAFKA_BROKER_MAL
              {{- if and .Values.tls.enabled .Values.tls.autoDiscover }}
              value: {{ printf "%s-kafka-bootstrap.%s.svc.cluster.local:%v" .Values.tls.kafkaClusterName .Release.Namespace .Values.tls.kafkaPort | quote }}
              {{- else if and .Values.sasl.enabled .Values.sasl.autoDiscover }}
              value: {{ printf "%s-kafka-bootstrap.%s.svc.cluster.local:%v" .Values.sasl.kafkaClusterName .Release.Namespace .Values.sasl.kafkaPort | quote }}
              {{- else if .Values.env.AKTO_KAFKA_BROKER_MAL }}
              value: {{ .Values.env.AKTO_KAFKA_BROKER_MAL | quote }}
              {{- else }}
              value: {{ printf "%s.%s.svc.cluster.local:9092" (default (printf "%s-mini-runtime" .Values.miniRuntimeReleaseName) .Values.miniRuntimeServiceName) .Release.Namespace | quote }}
              {{- end }}
            - name: AKTO_MONGO_CONN
              value: {{ .Values.env.AKTO_MONGO_CONN | quote }}
            - name: IS_AUTH_IMPLEMENTED
              value: {{ .Values.sasl.enabled | quote }}
            {{- if .Values.sasl.enabled }}
            {{- if $saslSecretName }}
            - name: KAFKA_USERNAME
              valueFrom:
                secretKeyRef:
                  name: {{ $saslSecretName | quote }}
                  key: {{ .Values.sasl.usernameKey | quote }}
            - name: KAFKA_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ $saslSecretName | quote }}
                  key: {{ .Values.sasl.passwordKey | quote }}
            {{- else if .Values.sasl.username }}
            - name: KAFKA_USERNAME
              value: {{ .Values.sasl.username | quote }}
            - name: KAFKA_PASSWORD
              value: {{ .Values.sasl.password | quote }}
            {{- end }}
            - name: AKTO_KAFKA_SASL_MECHANISM
              value: {{ .Values.sasl.saslMechanism | quote }}
            {{- end }}
            - name: AKTO_THREAT_ENABLED
              value: {{ .Values.env.AKTO_THREAT_ENABLED | quote }}
            {{- if .Values.tls.enabled }}
            - name: USE_TLS
              value: "true"
            - name: TLS_CA_CERT_PATH
              value: {{ printf "%s/%s" .Values.tls.mountPath .Values.tls.caCertKey | quote }}
            - name: INSECURE_SKIP_VERIFY
              value: {{ .Values.tls.insecureSkipVerify | quote }}
            {{- end }}
          {{- if .Values.tls.enabled }}
          volumeMounts:
            - name: kafka-tls-ca
              mountPath: {{ .Values.tls.mountPath | quote }}
              readOnly: true
          {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      {{- if .Values.tls.enabled }}
      volumes:
        - name: kafka-tls-ca
          secret:
            secretName: {{ $caSecretName | quote }}
      {{- end }}
{{- end }}

