image:
  repository: aktosecurity/mirror-api-logging
  tag: k8s_agent
  pullPolicy: Always

podAnnotations: {}
podLabels: {}

hostNetwork: true
dnsPolicy: ClusterFirstWithHostNet

env:
  DEPLOY_DAEMONSET: true
  AKTO_TRAFFIC_BATCH_TIME_SECS: "10"
  AKTO_TRAFFIC_BATCH_SIZE: "100"
  AKTO_INFRA_MIRRORING_MODE: "gcp"
  AKTO_KAFKA_BROKER_MAL: "akto-mini-runtime-mini-runtime:9092"
  AKTO_MONGO_CONN: "mongodb://0.0.0.0:27017"
  IS_AUTH_IMPLEMENTED: "false"
  KAFKA_USERNAME: ""
  KAFKA_PASSWORD: ""
  AKTO_THREAT_ENABLED: false

resources: {}

tolerations: []
nodeSelector: {}
affinity: {}
 
miniRuntimeServiceName: ""
miniRuntimeReleaseName: "akto-mini-runtime"

# SASL credentials — set existingSecret to reference a pre-existing Secret
# (e.g. the "<clusterName>-sasl-credentials" Secret created by the mini-runtime chart)
sasl:
  existingSecret: ""      # option 1: reference existing Secret with SASL credentials
  usernameKey: "username" # key inside the Secret for the Kafka username
  passwordKey: "password" # key inside the Secret for the Kafka password
  username: ""            # option 2: inline credentials
  password: ""

# TLS configuration for Kafka connection
# Mode 1 (default): auto-discover Strimzi CA cert secret
#   Set tls.enabled=true — secret name derived as "<kafkaClusterName>-cluster-ca-cert"
# Mode 2: bring your own secret
#   Set tls.enabled=true, tls.autoDiscover=false, tls.caSecretName=<your-secret>
tls:
  enabled: false
  autoDiscover: true              # derive CA secret from kafkaClusterName (Strimzi default)
  kafkaClusterName: "akto-kafka"  # matches kafkaCluster.clusterName in mini-runtime chart
  kafkaPort: 9093                 # TLS listener port — used when autoDiscover=true and AKTO_KAFKA_BROKER_MAL is not overridden
  caSecretName: ""                # used when autoDiscover=false
  caCertKey: "ca.crt"             # key inside the secret containing the CA cert
  mountPath: "/etc/kafka/tls"
  insecureSkipVerify: false

