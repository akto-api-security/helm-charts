apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "akto.fullname" . }}-mini-runtime
  labels:
  {{- include "akto.labels" . | nindent 4 }}
  annotations:
    {{- with .Values.mini_runtime.deploymentAnnotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
    {{- if .Values.keel.keel.enabled }}
    keel.sh/policy: force
    keel.sh/match-tag: "true"
    keel.sh/trigger: poll
    keel.sh/pollSchedule: "@every 60m"
    keel.sh/monitorContainers: "runtime"
    {{- end }}
spec:
  replicas: {{ .Values.mini_runtime.replicas }}
  selector:
    matchLabels:
      app: {{ include "akto.fullname" . }}-mini-runtime
    {{- include "akto.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        app: {{ include "akto.fullname" . }}-mini-runtime
      {{- include "akto.selectorLabels" . | nindent 8 }}
      annotations:
        {{- with .Values.mini_runtime.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if .Values.kafkaCluster.enabled }}
      initContainers:
      - name: wait-for-kafka
        image: busybox:latest
        imagePullPolicy: IfNotPresent
        command:
          - /bin/sh
          - -c
          - |
            KAFKA_HOST="{{ .Values.kafkaCluster.clusterName }}-kafka-bootstrap.{{ .Release.Namespace }}.svc.cluster.local"
            KAFKA_PORT="{{ .Values.kafkaCluster.ports.plain }}"
            echo "Waiting for Kafka at ${KAFKA_HOST}:${KAFKA_PORT}..."
            until nc -z "${KAFKA_HOST}" "${KAFKA_PORT}"; do
              echo "Kafka not ready yet, retrying in 5s..."
              sleep 5
            done
            echo "Kafka is ready."
      {{- end }}
      containers:
      - env:
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: NODE_NAME
          valueFrom:
            fieldRef:
              fieldPath: spec.nodeName
        - name: AKTO_ACCOUNT_NAME
          value: {{ quote .Values.mini_runtime.aktoApiSecurityRuntime.env.aktoAccountName }}
        - name: IS_KUBERNETES
          value: "true"
        - name: RUNTIME_MODE
          value: "hybrid"
        - name: AKTO_CONFIG_NAME
          value: {{ quote .Values.mini_runtime.aktoApiSecurityRuntime.env.aktoConfigName }}
        - name: AKTO_INSTANCE_TYPE
          value: {{ quote .Values.mini_runtime.aktoApiSecurityRuntime.env.aktoInstanceType }}
        - name: AKTO_KAFKA_BROKER_MAL
          value: {{ if .Values.kafkaCluster.enabled }}{{ printf "%s-kafka-bootstrap.%s.svc.cluster.local:%v" .Values.kafkaCluster.clusterName .Release.Namespace .Values.kafkaCluster.ports.plain | quote }}{{ else if .Values.mini_runtime.useExternalKafka }}{{ quote .Values.mini_runtime.externalKafka.brokerUrl }}{{ else }}{{ quote .Values.mini_runtime.aktoApiSecurityRuntime.env.aktoKafkaBrokerMal }}{{ end }}
        - name: AKTO_KAFKA_BROKER_URL
          value: {{ if .Values.kafkaCluster.enabled }}{{ printf "%s-kafka-bootstrap.%s.svc.cluster.local:%v" .Values.kafkaCluster.clusterName .Release.Namespace .Values.kafkaCluster.ports.plain | quote }}{{ else if .Values.mini_runtime.useExternalKafka }}{{ quote .Values.mini_runtime.externalKafka.brokerUrl }}{{ else }}{{ quote .Values.mini_runtime.aktoApiSecurityRuntime.env.aktoKafkaBrokerUrl }}{{ end }}
        - name: AKTO_KAFKA_GROUP_ID_CONFIG
          value: {{ quote .Values.mini_runtime.aktoApiSecurityRuntime.env.aktoKafkaGroupIdConfig
            }}
        - name: AKTO_KAFKA_MAX_POLL_RECORDS_CONFIG
          value: {{ quote .Values.mini_runtime.aktoApiSecurityRuntime.env.aktoKafkaMaxPollRecordsConfig
            }}
        - name: AKTO_KAFKA_TOPIC_NAME
          value: {{ quote .Values.mini_runtime.aktoApiSecurityRuntime.env.aktoKafkaTopicName
            }}
        - name: AKTO_TRAFFIC_BATCH_SIZE
          value: {{ quote .Values.mini_runtime.aktoApiSecurityRuntime.env.aktoTrafficBatchSize
            }}
        - name: AKTO_TRAFFIC_BATCH_TIME_SECS
          value: {{ quote .Values.mini_runtime.aktoApiSecurityRuntime.env.aktoTrafficBatchTimeSecs
            }}
        - name: PUPPETEER_REPLAY_SERVICE_URL
          value: {{ quote .Values.mini_runtime.aktoApiSecurityRuntime.env.puppeteerReplayServiceUrl
            }}
        - name: AKTO_LOG_LEVEL
          value: {{ quote .Values.mini_runtime.aktoApiSecurityRuntime.env.aktoLogLevel }}
        - name: AKTO_RUN_MCP_JOBS
          value: {{ quote .Values.mini_runtime.aktoApiSecurityRuntime.env.aktoRunMcpJobs }}
        - name: SEND_TO_THREAT_ENABLED
          value: {{ quote (.Values.mini_runtime.aktoApiSecurityRuntime.env.sendToThreatEnabled | default "true") }}
        - name: AKTO_MONGO_CONN
          value: {{ quote .Values.mongo.aktoMongoConn }}
        - name: USE_HOSTNAME
          value: {{ quote .Values.mini_runtime.aktoApiSecurityRuntime.env.useHostName}}
        - name: DATABASE_ABSTRACTOR_SERVICE_URL
          value: {{ quote .Values.mini_runtime.aktoApiSecurityRuntime.env.databaseAbstractorUrl}}
        - name: DATABASE_ABSTRACTOR_SERVICE_TOKEN
            {{- if .Values.mini_runtime.aktoApiSecurityRuntime.env.useSecretsForDatabaseAbstractorToken }}
          valueFrom:
            secretKeyRef:
              key: token
              name: {{ (tpl .Values.mini_runtime.aktoApiSecurityRuntime.env.databaseAbstractorTokenSecrets.existingSecret .) | default (printf "%s-mini-runtime" (include "akto.fullname" .) ) }}
            {{- else }}
          value: {{ quote .Values.mini_runtime.aktoApiSecurityRuntime.env.databaseAbstractorToken }}
            {{- end }}
        - name: KUBERNETES_CLUSTER_DOMAIN
          value: {{ quote .Values.kubernetesClusterDomain }}
        {{- if or (and .Values.kafkaCluster.enabled .Values.kafkaCluster.sasl.enabled) (and .Values.mini_runtime.useExternalKafka .Values.mini_runtime.externalKafka.username) }}
        - name: KAFKA_AUTH_ENABLED
          value: "true"
        - name: AKTO_KAFKA_SASL_ENABLED
          value: "true"
        - name: AKTO_KAFKA_SASL_MECHANISM
          value: {{ if .Values.kafkaCluster.enabled }}{{ quote .Values.kafkaCluster.sasl.mechanism }}{{ else }}{{ quote .Values.mini_runtime.externalKafka.saslMechanism }}{{ end }}
        {{- if .Values.mini_runtime.useExternalKafka }}
        - name: AKTO_KAFKA_SECURITY_PROTOCOL
          value: {{ quote .Values.mini_runtime.externalKafka.securityProtocol }}
        {{- end }}
        {{- if and .Values.kafkaCluster.enabled .Values.kafkaCluster.sasl.enabled }}
        - name: KAFKA_USERNAME
          valueFrom:
            secretKeyRef:
              name: {{ if .Values.kafkaCluster.sasl.useExistingSecret }}{{ .Values.kafkaCluster.sasl.existingSecret | quote }}{{ else }}{{ printf "%s-sasl-credentials" .Values.kafkaCluster.clusterName | quote }}{{ end }}
              key: username
        - name: KAFKA_PASSWORD
          valueFrom:
            secretKeyRef:
              name: {{ if .Values.kafkaCluster.sasl.useExistingSecret }}{{ .Values.kafkaCluster.sasl.existingSecret | quote }}{{ else }}{{ printf "%s-sasl-credentials" .Values.kafkaCluster.clusterName | quote }}{{ end }}
              key: password
        {{- else }}
        - name: KAFKA_USERNAME
          value: {{ quote .Values.mini_runtime.externalKafka.username }}
        - name: KAFKA_PASSWORD
          value: {{ quote .Values.mini_runtime.externalKafka.password }}
        {{- end }}
        {{- end }}
        {{- if and .Values.kafkaCluster.enabled .Values.kafkaCluster.tls }}
        - name: AKTO_KAFKA_TLS_ENABLED
          value: "true"
        - name: AKTO_KAFKA_SECURITY_PROTOCOL
          value: {{ if .Values.kafkaCluster.sasl.enabled }}"SASL_SSL"{{ else }}"SSL"{{ end }}
        - name: KAFKA_SSL_TRUSTSTORE_LOCATION
          value: "/etc/kafka/tls/ca.crt"
        {{- end }}
        image: {{ .Values.mini_runtime.aktoApiSecurityRuntime.image.repository }}{{ if .Values.mini_runtime.aktoApiSecurityRuntime.image.digest }}@{{ .Values.mini_runtime.aktoApiSecurityRuntime.image.digest }}{{ else }}:{{ .Values.mini_runtime.aktoApiSecurityRuntime.image.tag | default .Chart.AppVersion }}{{ end }}
        imagePullPolicy: {{ .Values.mini_runtime.aktoApiSecurityRuntime.imagePullPolicy }}
        name: akto-api-security-runtime
        resources: {{- toYaml .Values.mini_runtime.aktoApiSecurityRuntime.resources |  nindent 10 }}
        volumeMounts:
        {{- if .Values.fluent_bit.enabled }}
        - name: log-storage
          mountPath: /var/log/app
        {{- end }}
        {{- if and .Values.kafkaCluster.enabled .Values.kafkaCluster.tls }}
        - name: kafka-tls-ca
          mountPath: /etc/kafka/tls
          readOnly: true
        {{- end }}

      {{- if .Values.fluent_bit.enabled }}
      - name: fluent-bit
        image: {{ .Values.fluent_bit.image.repository }}{{ if .Values.fluent_bit.image.digest }}@{{ .Values.fluent_bit.image.digest }}{{ else }}:{{ .Values.fluent_bit.image.tag | default "latest" }}{{ end }}
        imagePullPolicy: {{ .Values.fluent_bit.image.pullPolicy }}
        env:
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: POD_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        resources:
          limits:
            cpu: {{ .Values.fluent_bit.resources.limits.cpu | default "100m" }}
            memory: {{ .Values.fluent_bit.resources.limits.memory | default "128Mi" }}
          requests:
            cpu: {{ .Values.fluent_bit.resources.requests.cpu | default "50m" }}
            memory: {{ .Values.fluent_bit.resources.requests.memory | default "64Mi" }}
        volumeMounts:
        - name: log-storage
          mountPath: /var/log/app
          readOnly: true
        - name: fluent-bit-config
          mountPath: /fluent-bit/etc
        - name: fluent-bit-state
          mountPath: /var/fluent-bit/state
      {{- end }}

      restartPolicy: Always
      volumes:
      {{- if .Values.fluent_bit.enabled }}
      - name: log-storage
        emptyDir:
          sizeLimit: {{ .Values.fluent_bit.logStorage.sizeLimit }}
      - name: fluent-bit-config
        configMap:
          name: {{ include "akto.fullname" . }}-fluent-bit
      - name: fluent-bit-state
        emptyDir:
          sizeLimit: {{ .Values.fluent_bit.stateStorage.sizeLimit }}
      {{- end }}
      {{- if and .Values.kafkaCluster.enabled .Values.kafkaCluster.tls }}
      - name: kafka-tls-ca
        secret:
          secretName: {{ printf "%s-cluster-ca-cert" .Values.kafkaCluster.clusterName | quote }}
      {{- end }}

---
{{ if .Values.keel.keel.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "akto.fullname" . }}-keel
  labels:
    app: keel
  {{- include "akto.labels" . | nindent 4 }}
  annotations:
    {{- with .Values.keel.deploymentAnnotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  replicas: {{ .Values.keel.replicas }}
  selector:
    matchLabels:
      app: {{ include "akto.fullname" . }}-keel
    {{- include "akto.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        app: {{ include "akto.fullname" . }}-keel
      {{- include "akto.selectorLabels" . | nindent 8 }}
      annotations:
        {{- with .Values.keel.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
      - command:
        - /bin/keel
        env:
        - name: NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        - name: AWS_ACCESS_KEY_ID
          value: {{ quote .Values.keel.keel.env.awsAccessKeyId }}
        - name: AWS_SECRET_ACCESS_KEY
          value: {{ quote .Values.keel.keel.env.awsSecretAccessKey }}
        - name: AWS_REGION
          value: {{ quote .Values.keel.keel.env.awsRegion }}
        - name: WEBHOOK_ENDPOINT
          value: {{ quote .Values.keel.keel.env.webhookEndpoint }}
        - name: MATTERMOST_ENDPOINT
          value: {{ quote .Values.keel.keel.env.mattermostEndpoint }}
        - name: HIPCHAT_TOKEN
          value: {{ quote .Values.keel.keel.env.hipchatToken }}
        - name: HIPCHAT_CHANNELS
          value: {{ quote .Values.keel.keel.env.hipchatChannels }}
        - name: HIPCHAT_APPROVALS_CHANNEL
          value: {{ quote .Values.keel.keel.env.hipchatApprovalsChannel }}
        - name: HIPCHAT_APPROVALS_BOT_NAME
          value: {{ quote .Values.keel.keel.env.hipchatApprovalsBotName }}
        - name: HIPCHAT_APPROVALS_USER_NAME
          value: {{ quote .Values.keel.keel.env.hipchatApprovalsUserName }}
        - name: HIPCHAT_APPROVALS_PASSWORT
          value: {{ quote .Values.keel.keel.env.hipchatApprovalsPasswort }}
        - name: NOTIFICATION_LEVEL
          value: {{ quote .Values.keel.keel.env.notificationLevel }}
        - name: INSECURE_REGISTRY
          value: {{ quote .Values.keel.keel.env.insecureRegistry }}
        - name: KUBERNETES_CLUSTER_DOMAIN
          value: {{ quote .Values.kubernetesClusterDomain }}
        image: {{ .Values.keel.keel.image.repository }}{{ if .Values.keel.keel.image.digest }}@{{ .Values.keel.keel.image.digest }}{{ else }}:{{ .Values.keel.keel.image.tag | default .Chart.AppVersion }}{{ end }}
        imagePullPolicy: {{ .Values.keel.keel.imagePullPolicy }}
        livenessProbe:
          httpGet:
            path: /healthz
            port: 9300
          initialDelaySeconds: 30
          timeoutSeconds: 10
        name: keel
        ports:
        - containerPort: 9300
        resources: {{- toYaml .Values.keel.keel.resources | nindent 10 }}
      serviceAccountName: {{ include "akto.fullname" . }}-keel
{{ end }}

{{ if .Values.threat_client.aktoApiSecurityThreatClient.env.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "akto.fullname" . }}-threat-client
  labels:
  {{- include "akto.labels" . | nindent 4 }}
  annotations:
    {{- with .Values.threat_client.deploymentAnnotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
    {{- if .Values.keel.keel.enabled }}
    keel.sh/policy: force
    keel.sh/match-tag: "true"
    keel.sh/trigger: poll
    keel.sh/pollSchedule: "@every 60m"
    {{- end }}
spec:
  replicas: {{ .Values.threat_client.replicas }}
  selector:
    matchLabels:
      app: {{ include "akto.fullname" . }}-threat-client
    {{- include "akto.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        app: {{ include "akto.fullname" . }}-threat-client
      {{- include "akto.selectorLabels" . | nindent 8 }}
      annotations:
        {{- with .Values.threat_client.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if .Values.kafkaCluster.enabled }}
      initContainers:
      - name: wait-for-kafka
        image: busybox:latest
        imagePullPolicy: IfNotPresent
        command:
          - /bin/sh
          - -c
          - |
            KAFKA_HOST="{{ .Values.kafkaCluster.clusterName }}-kafka-bootstrap.{{ .Release.Namespace }}.svc.cluster.local"
            KAFKA_PORT="{{ .Values.kafkaCluster.ports.plain }}"
            echo "Waiting for Kafka at ${KAFKA_HOST}:${KAFKA_PORT}..."
            until nc -z "${KAFKA_HOST}" "${KAFKA_PORT}"; do
              echo "Kafka not ready yet, retrying in 5s..."
              sleep 5
            done
            echo "Kafka is ready."
      {{- end }}
      containers:
      - env:
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: NODE_NAME
          valueFrom:
            fieldRef:
              fieldPath: spec.nodeName
        - name: RUNTIME_MODE
          value: "hybrid"
        - name: AKTO_THREAT_DETECTION_POSTGRES
          value: {{ quote .Values.threat_client.aktoApiSecurityThreatClient.env.postgresUrl }}
        - name: AKTO_THREAT_DETECTION_POSTGRES_USER
          value: {{ quote .Values.threat_client.aktoApiSecurityThreatClient.env.postgresUser }}
        - name: AKTO_THREAT_DETECTION_POSTGRES_PASSWORD
          value: {{ quote .Values.threat_client.aktoApiSecurityThreatClient.env.postgresPassword
            }}
        - name: AKTO_TRAFFIC_KAFKA_BOOTSTRAP_SERVER
          value: {{ if .Values.kafkaCluster.enabled }}{{ printf "%s-kafka-bootstrap.%s.svc.cluster.local:%v" .Values.kafkaCluster.clusterName .Release.Namespace .Values.kafkaCluster.ports.plain | quote }}{{ else if .Values.mini_runtime.useExternalKafka }}{{ quote .Values.mini_runtime.externalKafka.brokerUrl }}{{ else }}{{ quote .Values.mini_runtime.aktoApiSecurityRuntime.env.aktoKafkaBrokerUrl }}{{ end }}
        - name: AKTO_INTERNAL_KAFKA_BOOTSTRAP_SERVER
          value: {{ if .Values.kafkaCluster.enabled }}{{ printf "%s-kafka-bootstrap.%s.svc.cluster.local:%v" .Values.kafkaCluster.clusterName .Release.Namespace .Values.kafkaCluster.ports.plain | quote }}{{ else if .Values.mini_runtime.useExternalKafka }}{{ quote .Values.mini_runtime.externalKafka.brokerUrl }}{{ else }}{{ quote .Values.mini_runtime.aktoApiSecurityRuntime.env.aktoKafkaBrokerUrl }}{{ end }}
        - name: AKTO_THREAT_DETECTION_LOCAL_REDIS_URI
          value: "redis://{{ include "akto.fullname" . }}-redis:6379"

        - name: AKTO_THREAT_PROTECTION_BACKEND_TOKEN
            {{- if .Values.mini_runtime.aktoApiSecurityRuntime.env.useSecretsForDatabaseAbstractorToken }}
          valueFrom:
            secretKeyRef:
              key: token
              name: {{ (tpl .Values.mini_runtime.aktoApiSecurityRuntime.env.databaseAbstractorTokenSecrets.existingSecret .) | default (printf "%s-mini-runtime" (include "akto.fullname" .) ) }}
            {{- else }}
          value: {{ quote .Values.mini_runtime.aktoApiSecurityRuntime.env.databaseAbstractorToken }}
            {{- end }}

        - name: DATABASE_ABSTRACTOR_SERVICE_TOKEN
            {{- if .Values.mini_runtime.aktoApiSecurityRuntime.env.useSecretsForDatabaseAbstractorToken }}
          valueFrom:
            secretKeyRef:
              key: token
              name: {{ (tpl .Values.mini_runtime.aktoApiSecurityRuntime.env.databaseAbstractorTokenSecrets.existingSecret .) | default (printf "%s-mini-runtime" (include "akto.fullname" .) ) }}
            {{- else }}
          value: {{ quote .Values.mini_runtime.aktoApiSecurityRuntime.env.databaseAbstractorToken }}
            {{- end }}
        - name: AKTO_LOG_LEVEL
          value: {{ quote .Values.threat_client.aktoApiSecurityThreatClient.env.aktoLogLevel }}
        - name: AKTO_THREAT_PROTECTION_BACKEND_URL
          value: {{ quote .Values.threat_client.aktoApiSecurityThreatClient.env.backendUrl }}
        - name: AGGREGATION_RULES_ENABLED
          value: {{ quote .Values.threat_client.aktoApiSecurityThreatClient.env.aggregationRulesEnabled }}
        - name: KUBERNETES_CLUSTER_DOMAIN
          value: {{ quote .Values.kubernetesClusterDomain }}
        {{- if or (and .Values.kafkaCluster.enabled .Values.kafkaCluster.sasl.enabled) (and .Values.mini_runtime.useExternalKafka .Values.mini_runtime.externalKafka.username) }}
        - name: AKTO_KAFKA_SASL_ENABLED
          value: "true"
        - name: AKTO_KAFKA_SASL_MECHANISM
          value: {{ if .Values.kafkaCluster.enabled }}{{ quote .Values.kafkaCluster.sasl.mechanism }}{{ else }}{{ quote .Values.mini_runtime.externalKafka.saslMechanism }}{{ end }}
        - name: KAFKA_AUTH_ENABLED
          value: "true"
        {{- if .Values.mini_runtime.useExternalKafka }}
        - name: AKTO_KAFKA_SECURITY_PROTOCOL
          value: {{ quote .Values.mini_runtime.externalKafka.securityProtocol }}
        {{- end }}
        {{- if and .Values.kafkaCluster.enabled .Values.kafkaCluster.sasl.enabled }}
        - name: KAFKA_USERNAME
          valueFrom:
            secretKeyRef:
              name: {{ if .Values.kafkaCluster.sasl.useExistingSecret }}{{ .Values.kafkaCluster.sasl.existingSecret | quote }}{{ else }}{{ printf "%s-sasl-credentials" .Values.kafkaCluster.clusterName | quote }}{{ end }}
              key: username
        - name: KAFKA_PASSWORD
          valueFrom:
            secretKeyRef:
              name: {{ if .Values.kafkaCluster.sasl.useExistingSecret }}{{ .Values.kafkaCluster.sasl.existingSecret | quote }}{{ else }}{{ printf "%s-sasl-credentials" .Values.kafkaCluster.clusterName | quote }}{{ end }}
              key: password
        - name: AKTO_KAFKA_USERNAME
          valueFrom:
            secretKeyRef:
              name: {{ if .Values.kafkaCluster.sasl.useExistingSecret }}{{ .Values.kafkaCluster.sasl.existingSecret | quote }}{{ else }}{{ printf "%s-sasl-credentials" .Values.kafkaCluster.clusterName | quote }}{{ end }}
              key: username
        - name: AKTO_KAFKA_PASSWORD
          valueFrom:
            secretKeyRef:
              name: {{ if .Values.kafkaCluster.sasl.useExistingSecret }}{{ .Values.kafkaCluster.sasl.existingSecret | quote }}{{ else }}{{ printf "%s-sasl-credentials" .Values.kafkaCluster.clusterName | quote }}{{ end }}
              key: password
        {{- else }}
        - name: KAFKA_USERNAME
          value: {{ quote .Values.mini_runtime.externalKafka.username }}
        - name: KAFKA_PASSWORD
          value: {{ quote .Values.mini_runtime.externalKafka.password }}
        - name: AKTO_KAFKA_USERNAME
          value: {{ quote .Values.mini_runtime.externalKafka.username }}
        - name: AKTO_KAFKA_PASSWORD
          value: {{ quote .Values.mini_runtime.externalKafka.password }}
        {{- end }}
        {{- end }}
        {{- if and .Values.kafkaCluster.enabled .Values.kafkaCluster.tls }}
        - name: AKTO_KAFKA_TLS_ENABLED
          value: "true"
        - name: AKTO_KAFKA_SECURITY_PROTOCOL
          value: {{ if .Values.kafkaCluster.sasl.enabled }}"SASL_SSL"{{ else }}"SSL"{{ end }}
        - name: KAFKA_SSL_TRUSTSTORE_LOCATION
          value: "/etc/kafka/tls/ca.crt"
        {{- end }}
        image: {{ .Values.threat_client.aktoApiSecurityThreatClient.image.repository }}{{ if .Values.threat_client.aktoApiSecurityThreatClient.image.digest }}@{{ .Values.threat_client.aktoApiSecurityThreatClient.image.digest }}{{ else }}:{{ .Values.threat_client.aktoApiSecurityThreatClient.image.tag | default .Chart.AppVersion }}{{ end }}
        imagePullPolicy: {{ .Values.threat_client.aktoApiSecurityThreatClient.imagePullPolicy }}
        name: akto-api-security-threat-client
        resources: {{- toYaml .Values.threat_client.aktoApiSecurityThreatClient.resources |  nindent 10 }}
        {{- if and .Values.kafkaCluster.enabled .Values.kafkaCluster.tls }}
        volumeMounts:
        - name: kafka-tls-ca
          mountPath: /etc/kafka/tls
          readOnly: true
        {{- end }}
      restartPolicy: Always
      {{- if and .Values.kafkaCluster.enabled .Values.kafkaCluster.tls }}
      volumes:
      - name: kafka-tls-ca
        secret:
          secretName: {{ printf "%s-cluster-ca-cert" .Values.kafkaCluster.clusterName | quote }}
      {{- end }}
{{ end }}
