mongo:
  aktoMongoConn: ""

kubernetesClusterDomain: cluster.local

# Node scheduling configuration
nodeSelector: {}
  # Example usage:
  # nodetype: coreservices

tolerations: []
  # Example usage:
  # - key: nodetype
  #   operator: Equal
  #   value: coreservices
  #   effect: NoSchedule

affinity: {}
  # Example usage:
  # nodeAffinity:
  #   requiredDuringSchedulingIgnoredDuringExecution:
  #     nodeSelectorTerms:
  #     - matchExpressions:
  #       - key: nodetype
  #         operator: In
  #         values:
  #         - coreservices

mini_runtime:
  # External Kafka Configuration
  # Set useExternalKafka to true to use an existing Kafka cluster outside of this chart
  useExternalKafka: false
  externalKafka:
    # Kafka broker URL (e.g., kafka.example.com:9092 or kafka1:9092,kafka2:9092,kafka3:9092)
    brokerUrl: ""
    # SASL authentication (leave empty for no authentication)
    username: ""
    password: ""
    # SASL mechanism for external Kafka: PLAIN, SCRAM-SHA-256, or SCRAM-SHA-512
    saslMechanism: "SCRAM-SHA-256"
    # SSL/TLS configuration for external Kafka
    # Set to true if connecting via SSL/TLS (e.g., MSK with TLS)
    useSsl: false
    # Security protocol: PLAINTEXT, SASL_PLAINTEXT, SASL_SSL, SSL
    securityProtocol: "SASL_SSL"

  aktoApiSecurityRuntime:
    env:
      aktoAccountName: Helios
      aktoConfigName: staging
      aktoInstanceType: DASHBOARD
      # Broker URL used when useExternalKafka: true (ignored when kafkaCluster.enabled: true)
      aktoKafkaBrokerMal: ""
      aktoKafkaBrokerUrl: ""
      aktoKafkaGroupIdConfig: asdf
      aktoKafkaMaxPollRecordsConfig: "100"
      aktoKafkaTopicName: akto.api.logs
      aktoTrafficBatchSize: "100"
      aktoTrafficBatchTimeSecs: "10"
      aktoLogLevel: WARN
      aktoRunMcpJobs: "true"
      # Enable sending traffic to threat detection (runtime reads SEND_TO_THREAT_ENABLED env)
      sendToThreatEnabled: "true"
      puppeteerReplayServiceUrl: http://akto-puppeteer-replay:3000
      useHostName: true
      databaseAbstractorUrl: https://cyborg.akto.io
      # If you want to use secrets to store database abstractor token. default: false
      useSecretsForDatabaseAbstractorToken: false
      # If not using secrets, place token here.
      databaseAbstractorToken: ""
      # If using secrets, place token here.
      databaseAbstractorTokenSecrets:
        # Name of an existing secret containing the Database Abstractor Token
        existingSecret: ""
        # Token to use if existingSecret is not provided
        token: ""
    image:
      repository: aktosecurity/mini-runtime
      tag: a-feat-mr-kafka-scram
    imagePullPolicy: Always
    resources:
      requests:
        cpu: 1
        memory: "2Gi"
      limits:
        cpu: 2
        memory: "4Gi"

  replicas: 1

# Strimzi-based Kafka cluster (default mode)
# Set mini_runtime.useExternalKafka: true to disable and use your own Kafka instead
kafkaCluster:
  enabled: true
  clusterName: "akto-kafka"  # used in labels and bootstrap DNS

  broker:
    replicas: 1             # increase to 3 for HA (also bump replication factors below)
    resources:
      requests:
        cpu: "1.5"
        memory: "4Gi"
      limits:
        cpu: "1.5"
        memory: "4Gi"
    storage:
      size: "10Gi"
      storageClass: ""       # leave empty for default StorageClass
      deleteClaim: true

  controller:
    replicas: 1
    resources:
      requests:
        cpu: "500m"
        memory: "1Gi"
      limits:
        cpu: "500m"
        memory: "1Gi"
    storage:
      size: "10Gi"
      storageClass: ""
      deleteClaim: true

  config:
    retentionMs: "604800000"       # 7 days
    retentionBytes: "5368709120"   # 5GB per partition
    cleanupPolicy: "delete"
    # set to 3 when broker.replicas: 3
    defaultReplicationFactor: 1
    minInsyncReplicas: 1
    offsetsTopicReplicationFactor: 1
    transactionStateLogReplicationFactor: 1
    transactionStateLogMinIsr: 1

  # Listener port overrides — also controls the bootstrap URL injected into runtime/threat-client
  ports:
    plain: 9092   # plain (or SASL) listener port
    tls: 9093     # TLS listener port (only used when tls: true)

  tls: false      # enable TLS listener; Strimzi auto-generates broker certs via cluster CA
                  # CA cert stored in Secret: <clusterName>-cluster-ca-cert

  sasl:
    enabled: false
    mechanism: "SCRAM-SHA-512"   # SCRAM-SHA-256 or SCRAM-SHA-512
    username: "akto-runtime"
    password: ""
    useExistingSecret: false
    existingSecret: ""           # existing Secret name; must have keys: username, password

  # Annotations forwarded to Strimzi-generated Kafka Services via spec.kafka.template
  # Replaces the old mini_runtime.serviceAnnotations / mini_runtime.annotations
  serviceAnnotations: {}
  # Example:
  #   service.beta.kubernetes.io/aws-load-balancer-internal: "true"

  topics:
    - name: "akto.api.logs"
      partitions: 1         # increase to 3 when broker.replicas: 3
      replicas: 1           # increase to 3 when broker.replicas: 3
    - name: "akto.api.logs2"
      partitions: 1
      replicas: 1
    - name: "akto.api.producer.logs"
      partitions: 1
      replicas: 1
    - name: "akto.daemonset.producer.heartbeats"
      partitions: 1
      replicas: 1

keel:
  keel:
    env:
      awsAccessKeyId: ""
      awsRegion: ""
      awsSecretAccessKey: ""
      hipchatApprovalsBotName: ""
      hipchatApprovalsChannel: ""
      hipchatApprovalsPasswort: ""
      hipchatApprovalsUserName: ""
      hipchatChannels: ""
      hipchatToken: ""
      insecureRegistry: "true"
      mattermostEndpoint: ""
      notificationLevel: info
      webhookEndpoint: ""
    image:
      repository: public.ecr.aws/aktosecurity/keelhq-keel
      digest: sha256:1eb61443d68eff7efe1dc5607e8b3054a518c4abba0aa840ffb6a19456b04507
    imagePullPolicy: IfNotPresent
    enabled: true
    resources:
      limits:
        cpu: 100m
        memory: 128Mi
      requests:
        cpu: 50m
        memory: 64Mi
  maxUnavailable: 1
  ports:
  - name: keel
    port: 9300
    protocol: TCP
    targetPort: 9300
  replicas: 1
  serviceAccount:
    annotations: {}
  type: LoadBalancer

threat_client:
  replicas: 1
  aktoApiSecurityThreatClient:
    env:
      enabled: true
      aggregationRulesEnabled: true
      postgresUrl: jdbc:postgresql://postgres.default.svc.cluster.local:5432/akto
      postgresUser: akto
      postgresPassword: akto
      aktoAccountName: Helios
      aktoConfigName: staging
      aktoInstanceType: DASHBOARD
      backendUrl: https://tbs.akto.io
      aktoLogLevel: INFO
      useHostName: true
    image:
      repository: aktosecurity/akto-threat-detection
      tag: a-fix-threat-use-scram-sasl
    imagePullPolicy: Always
    resources:
      requests:
        cpu: 1.5
        memory: "2Gi"
      limits:
        cpu: 1.5
        memory: "2.5Gi"

redis:
  image:
    repository: public.ecr.aws/aktosecurity/redis
    digest: sha256:47200b04138293fae39737e50878a238b13ec0781083126b1b0c63cf5d992e8d
    pullPolicy: IfNotPresent
  resources:
    requests:
      cpu: "500m"
      memory: "500Mi"
    limits:
      cpu: "900m"
      memory: "1Gi"
  persistence:
    enabled: false
    size: "2Gi"
    storageClass: ""

fluent_bit:
  enabled: false

  image:
    repository: public.ecr.aws/aktosecurity/akto-logging-sidecar
    digest: sha256:7d727245767ae632eb296c2ff4d206bf2e205b5f244c1f37b8fdd61f9fb33985
    pullPolicy: IfNotPresent

  resources:
    limits:
      cpu: 100m
      memory: 128Mi
    requests:
      cpu: 50m
      memory: 64Mi

  flush: 5
  metricsPort: 2020
  logLevel: info
  # default values
  logStorage:
    sizeLimit: "1Gi"
  stateStorage:
    sizeLimit: "500Mi"
